<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~projekt_bc:bash — Newsletter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="128x128" href="icon128.png">
    <style>
        :root { 
            --terminal-green: #33ff00; 
            --terminal-dim: #1a8000; 
            --bg-color: #050505; 
            --error-red: #ff3333; 
            --taskbar-width: 65px; /* DODANO ZMIENNĄ */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: var(--bg-color); 
            color: var(--terminal-green); 
            font-family: 'VT323', monospace; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            overflow-x: hidden;
            margin-left: var(--taskbar-width); /* DODANO MARGINES NA TASKBAR */
        }

        /* Scanlines */
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        /* ========================================= */
        /* --- STYLE TASKBARA (DODANO) ------------- */
        /* ========================================= */
        #linux-taskbar {
            position: fixed; top: 0; left: 0; width: var(--taskbar-width); height: 100vh;
            background: rgba(20, 22, 20, 0.7); backdrop-filter: blur(8px);
            border-right: 1px solid var(--terminal-dim); z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px 0;
        }
        .taskbar-top, .taskbar-bottom { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .taskbar-logo-btn { width: 45px; height: 45px; cursor: pointer; transition: 0.3s; border-radius: 8px; border: 2px solid transparent; }
        .taskbar-logo-btn:hover { border-color: var(--terminal-green); transform: scale(1.1); }
        
        .social-placeholder { width: 35px; height: 35px; border-radius: 8px; border: 1px solid rgba(26, 128, 0, 0.3); background: rgba(0, 20, 0, 0.3); display: flex; justify-content: center; align-items: center; transition: 0.3s; overflow: hidden; }
        .social-placeholder img { width: 80%; height: 80%; object-fit: contain; }
        .social-placeholder:hover { border-color: var(--terminal-green); background: var(--terminal-green); }

        .tray-icons { display: flex; flex-direction: column; gap: 8px; opacity: 0.7; }
        .tray-placeholder { width: 20px; height: 20px; border: 1px solid var(--terminal-dim); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }
        
        #sys-clock { color: var(--terminal-green); font-size: 0.9rem; text-align: center; line-height: 1.1; padding-bottom: 10px; border-bottom: 1px solid rgba(26, 128, 0, 0.4); width: 80%; }
        .show-desktop-btn { width: 40px; height: 15px; border: 1px solid var(--terminal-dim); background: rgba(0, 0, 0, 0.5); border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .show-desktop-btn:hover { background: var(--terminal-green); }

        /* Menu Start */
        #start-menu {
            position: fixed; top: 15px; left: calc(var(--taskbar-width) + 10px); width: 300px;
            background: rgba(5, 5, 5, 0.95); border: 1px solid var(--terminal-green); padding: 20px;
            display: flex; flex-direction: column; gap: 15px; transform: translateX(-150%);
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 999;
        }
        #start-menu.active { transform: translateX(0); opacity: 1; }
        .start-menu-item { display: block; padding: 10px; border: 1px solid rgba(26, 128, 0, 0.3); background: rgba(20, 0, 0, 0.2); color: var(--terminal-green); text-decoration: none; text-align: left; text-transform: uppercase; transition: 0.2s; }
        .start-menu-item:hover { background: var(--terminal-green); color: var(--bg-color); padding-left: 20px; }

        /* ========================================= */
        /* --- RESZTA STYLI FORMULARZA ------------- */
        /* ========================================= */
        #terminal-window { width: 100%; max-width: 600px; z-index: 5; text-align: left; }
        #boot-log { color: var(--terminal-dim); margin-bottom: 2rem; min-height: 60px; white-space: pre-wrap; }
        #subscribe-form { opacity: 0; transition: opacity 0.5s ease-in; border: 1px solid var(--terminal-dim); padding: 2rem; background: rgba(0, 10, 0, 0.6); position: relative; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 1.2rem; text-transform: uppercase; }
        input[type="email"] { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--terminal-green); color: var(--terminal-green); font-family: 'VT323', monospace; font-size: 1.5rem; padding: 10px 0; outline: none; }
        .checkbox-wrapper { margin-bottom: 2rem; display: flex; align-items: flex-start; cursor: pointer; font-size: 1rem; color: var(--terminal-dim); }
        .checkbox-wrapper input { opacity: 0; position: absolute; }
        .custom-check::before { content: "[ ]"; margin-right: 10px; font-weight: bold; display: inline-block; width: 30px; }
        input:checked + .custom-check::before { content: "[X]"; color: var(--terminal-green); }
        button { background: transparent; color: var(--terminal-green); font-family: 'VT323', monospace; font-size: 1.4rem; border: 1px solid var(--terminal-green); padding: 10px 30px; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:not(:disabled):hover { background: var(--terminal-green); color: var(--bg-color); }
        .back-link { margin-top: 2rem; display: inline-block; color: var(--terminal-dim); text-decoration: none; border: 1px solid var(--terminal-dim); padding: 5px 15px; opacity: 0; transition: 0.3s; }
        .back-link:hover { color: var(--terminal-green); border-color: var(--terminal-green); }
        #status-msg { margin-top: 1rem; text-align: center; }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 850px) {
            body { margin-left: 50px; }
            #linux-taskbar { width: 50px; }
            #start-menu { width: calc(100vw - 50px); left: 50px; height: 100vh; top: 0; }
        }
    </style>
</head>
<body id="top">

    <nav id="linux-taskbar">
        <div class="taskbar-top">
            <img src="icon128.png" alt="Start" class="taskbar-logo-btn" id="taskbar-start-btn">
            <a href="https://facebook.com/..." class="social-placeholder"><img src="Images/Icons/fb.webp" alt="FB"></a>
            <a href="https://instagram.com/..." class="social-placeholder"><img src="Images/Icons/ig.webp" alt="IG"></a>
            <a href="https://tiktok.com/..." class="social-placeholder"><img src="Images/Icons/tt.webp" alt="TT"></a>
            <a href="https://youtube.com/..." class="social-placeholder"><img src="Images/Icons/yt.webp" alt="YT"></a>
        </div>
        <div class="taskbar-bottom">
            <div class="tray-icons">
                <div class="tray-placeholder">W</div>
                <div class="tray-placeholder">B</div>
                <div class="tray-placeholder">V</div>
            </div>
            <div id="sys-clock">
                <span id="sys-time">00:00</span><br><span id="sys-date">00.00</span>
            </div>
            <a href="index.html" class="show-desktop-btn" title="Pulpit"></a>
        </div>
    </nav>

    <div id="start-menu">
        <div class="start-menu-title">Menedżer Zadań [v1.0]</div>
        <a href="index.html" class="start-menu-item">Strona Główna</a>
        <a href="o_nas.html" class="start-menu-item">Akta Personalne (O Nas)</a>
        <a href="kontakt.html" class="start-menu-item">Raport Operacyjny (Kontakt)</a>
        <a href="newsletter.html" class="start-menu-item">Newsletter</a>
    </div>

    <div id="terminal-window">
        <div id="boot-log"></div>
        <form id="subscribe-form">
            <div class="input-group">
                <label for="email">IDENTYFIKATOR (E-mail):</label>
                <input type="email" id="email" name="email" placeholder="uzytkownik@system.pl" required>
            </div>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="consent" required>
                <span class="custom-check">AKCEPTUJĘ POLITYKĘ PRYWATNOŚCI I WYRAŻAM ZGODĘ NA PRZESYŁANIE NEWSLETTERA.</span>
            </label>
            <button type="submit" id="submit-btn" disabled>[ ZAPISZ_W_BAZIE ]</button>
            <div id="status-msg"></div>
        </form>
        <a href="index.html" class="back-link" id="back-btn">&lt; POWRÓT_DO_SYSTEMU</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        
        // --- LOGIKA TASKBARA ---
        const startBtn = document.getElementById('taskbar-start-btn');
        const startMenu = document.getElementById('start-menu');
        startBtn.addEventListener('click', (e) => { e.stopPropagation(); startMenu.classList.toggle('active'); });
        document.addEventListener('click', () => startMenu.classList.remove('active'));

        function updateClock() {
            const now = new Date();
            document.getElementById('sys-time').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            document.getElementById('sys-date').innerText = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // --- SUPABASE & FORM ---
        const SUPABASE_URL = 'https://zwmqfoyqcvesyckityng.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3bXFmb3lxY3Zlc3lja2l0eW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NDAzMTgsImV4cCI6MjA4NjMxNjMxOH0.U334yGtvol77tL1LPTkLZNGy_ddvN9kMzHyMbwZYfwM'; // Twój klucz
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const bootText = "INITIALIZING SECURE CONNECTION...\nREADY.";
        const logElement = document.getElementById('boot-log');
        let charIndex = 0;
        function fastBoot() {
            if (charIndex < bootText.length) {
                logElement.innerHTML += bootText[charIndex] === '\n' ? '<br>' : bootText[charIndex];
                charIndex++; setTimeout(fastBoot, 20);
            } else {
                document.getElementById('subscribe-form').style.opacity = 1;
                document.getElementById('back-btn').style.opacity = 1;
            }
        }
        window.onload = fastBoot;

        const checkbox = document.getElementById('consent');
        const submitBtn = document.getElementById('submit-btn');
        checkbox.addEventListener('change', () => submitBtn.disabled = !checkbox.checked);

        document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = "WYSYŁANIE...";
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const { error } = await supabase.from('newsletter_subscribers').insert([{ 
                    email: document.getElementById('email').value,
                    city: ipData.city, country: ipData.country_name 
                }]);
                if (error) throw error;
                document.getElementById('status-msg').innerHTML = "ZAPISANO W BAZIE.";
                submitBtn.innerHTML = "[ OK ]";
            } catch (err) {
                submitBtn.innerHTML = "[ BŁĄD ]";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
